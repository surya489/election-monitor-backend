services:
  database:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: election_monitor
    ports:
      - "27017:27017"
    volumes:
      - election-monitor-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    environment:
      MONGODB_URI: mongodb://database:27017/election_monitor
      PORT: 5000
      CLIENT_URL: http://localhost:3000
      JWT_SECRET: change-this-secret
      ADMIN_EMAIL: admin@voteflow.local
      ADMIN_PASSWORD: admin123
    ports:
      - "5000:5000"
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ../election-monitor
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  election-monitor-data:
